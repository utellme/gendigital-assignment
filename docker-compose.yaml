version: "3.9"

services:
  artifact-service:
    build:
      context: .

    container_name: artifact-service

    ports:
      - "8080:8080"

    environment:
      ARTIFACT_VERSION: v2
      LOG_LEVEL: INFO

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

    restart: unless-stopped